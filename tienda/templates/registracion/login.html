{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'tienda/css/styles.css' %}">
</head>
<style>
    .login-box {
    width: 350px;
    margin: 100px auto;
    padding: 30px;
    background: white;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.login-box button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #111827;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

.login-box button:hover {
    background: #38bdf8;
}

</style>
<body>

<div class="login-box">
    <h2>🔐 Iniciar Sesión</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
